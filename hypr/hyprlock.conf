source = ~/.config/matugen/generated/hyprlock-colors.conf

# BACKGROUND
background {
    monitor =
    path = ~/Pictures/Wallpapers/current
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 5
    disable_loading_bar = false
}

# TIME
label {
    monitor = DP-1
    text = $TIME
    color = $text_color
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, -140
    halign = center
    valign = top
}
label {
    monitor = DP-2
    text = $TIME
    color = $text_color
    font_size = 240
    font_family = SF Pro Display Bold
    position = 0, -140
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor = DP-1
    text = cmd[update:1000] echo "<span>$(date '+%A, %B %d')</span>"
    color = $complementary_text_color
    font_size = 30
    font_family = SF Pro Display Bold
    position = 0, -320
    halign = center
    valign = top
}
label {
    monitor = DP-2
    text = cmd[update:1000] echo "<span>$(date '+%A, %B %d')</span>"
    color = $complementary_text_color
    font_size = 60
    font_family = SF Pro Display Bold
    position = 0, -490
    halign = center
    valign = top
}

# LOGO
image {
    monitor = DP-1
    path = ~/.face
    border_size = 2
    border_color = rgba(255, 255, 255, .65)
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 50
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-1
    size = 290, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(60, 56, 54, 0.35)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Unlock 🔒</span></i>
    hide_input = false
    position = 0, -70
    halign = center
    valign = center
}

# BRANDING
label {
    monitor = DP-1
    text = 2026 Pineapple Incorporated©
    color = $text_color
    font_size = 16
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = bottom
}
label {
    monitor = DP-2
    text = 2026 Pineapple Incorporated©
    color = $text_color
    font_size = 32
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = bottom
}
